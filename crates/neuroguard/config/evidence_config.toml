# This configuration file defines evidence handling, legal framework mappings,
# cryptographic settings, and compliance parameters for the NeuroGuard system.
#
# All settings align with:
#   - CRPD (Convention on the Rights of Persons with Disabilities)
#   - ECHR (European Convention on Human Rights)
#   - UNESCO Neuroethics Recommendation 2026
#   - ALN-NanoNet HyperSafe Construct v1.0
#
