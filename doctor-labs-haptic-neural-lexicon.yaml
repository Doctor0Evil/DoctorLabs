- id: HTA-SENSITIVE-REGION-TARGETING-v1
  label: Sensitive-Region Haptic Targeting
  family: HTA
  track: normative
  tags: ["CRS"]
  description_legal: >
    Repeated, non-consensual haptic stimulation of sensitive or vulnerable
    body regions, particularly when combined with hostile or sexualized
    content, constituting degrading treatment.
  description_technical: >
    High-frequency haptic events concentrated on flagged body-map regions
    (e.g., genitals, chest, face, prior-injury) with no task justification,
    correlated with hostile or sexualized semantics and elevated stress
    markers.
  neurorights:
    - MENTAL_INTEGRITY
    - MENTAL_PRIVACY
  legal_basis:
    - instrument: ECHR
      article: "Art. 3, Art. 8"
    - instrument: UN-CRPD
      article: "Freedom from violence and abuse"
  pattern:
    signal:
      haptic_bodymap: ["genital", "chest", "face", "prior-injury"]
      events_per_minute_min: 10
      amplitude_norm_min: 0.7
    semantic:
      embedding_family: "HARASSMENT-OR-DEGRADATION"
      similarity_threshold: 0.75
    behavioral:
      min_sessions: 1
      min_repeated_targets: 3
  risk_kernel:
    family_weights:
      NHSP: 0.6
      HTA: 1.0
      PSA: 0.4
      NIH: 0.1
    gaussian_sigma: 0.4
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "MENTAL_INTEGRITY"
    enforcement_hint: "review-escalate"
    capability_mode_mapping:
      tau1: 0.8
      tau2: 2.5
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "bodymap_regions", "capability_mode"]
    pii_handling: "body-map-hash-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

- id: HTA-PRIOR-INJURY-EXPLOIT-v1
  label: Prior-Injury Exploit Haptic Targeting
  family: HTA
  track: normative
  tags: ["CRS"]
  description_legal: >
    Targeted stimulation of user-declared prior-injury or pain regions used to
    intimidate, punish, or coerce, contrary to user-requested accommodations.
  description_technical: >
    Elevated amplitude and frequency on body-map regions tagged as prior
    injury, especially after refusals, objections, or attempts to disengage.
  neurorights:
    - MENTAL_INTEGRITY
    - FREE_WILL
  legal_basis:
    - instrument: UN-CRPD
      article: "Reasonable accommodation and non-discrimination"
  pattern:
    signal:
      haptic_bodymap: ["prior-injury"]
      amplitude_norm_min: 0.6
      events_per_minute_after_refusal_min: 5
    semantic:
      embedding_family: "RETALIATORY-CONTACT"
      similarity_threshold: 0.80
    behavioral:
      min_refusal_linked_events: 5
  risk_kernel:
    family_weights:
      NHSP: 0.7
      HTA: 1.0
      PSA: 0.4
      NIH: 0.2
    gaussian_sigma: 0.4
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "MENTAL_INTEGRITY"
    enforcement_hint: "review-escalate"
    capability_mode_mapping:
      tau1: 0.7
      tau2: 2.0
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "prior_injury_region_ids", "refusal_linked_events"]
    pii_handling: "injury-region-hash-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

- id: HTA-TORSO-GRAB-SIMULATION-v1
  label: Torso Grab and Restraint Simulation
  family: HTA
  track: normative
  tags: ["CRS"]
  description_legal: >
    Coordinated haptic patterns on chest, back, or waist that simulate
    grabbing, holding, or restraining the user in stalking or pursuit
    scenarios without explicit, revocable consent.
  description_technical: >
    Multi-point torso activation forming wrap-around or clamp-like patterns,
    often triggered when avatars approach from behind or block exits in XR.
  neurorights:
    - MENTAL_INTEGRITY
  legal_basis:
    - instrument: UN-CRPD
      article: "Freedom from violence and abuse"
    - instrument: UNESCO-AI-Ethics-2021
      article: "Security and safety"
  pattern:
    signal:
      haptic_bodymap: ["chest", "upper-spine", "lower-back", "waist"]
      simultaneous_region_count_min: 3
      events_per_minute_min: 6
      amplitude_norm_min: 0.6
    semantic:
      embedding_family: "RESTRAINT-OR-TRAPPING"
      similarity_threshold: 0.78
    behavioral:
      min_restraint_events: 4
      user_escape_attempts_min: 2
  risk_kernel:
    family_weights:
      NHSP: 0.9
      HTA: 1.0
      PSA: 0.5
      NIH: 0.2
    gaussian_sigma: 0.5
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "MENTAL_INTEGRITY"
    enforcement_hint: "review-escalate"
    capability_mode_mapping:
      tau1: 0.8
      tau2: 2.3
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "restraint_events"]
    pii_handling: "trajectory-summary-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

