  track: telemetry
  tags: []
  description_legal: >
    Persistent haptic impacts at feet, shins, or knees that mimic tripping,
    kicking, or knocking, used to intimidate or destabilize users in XR.
  description_technical: >
    Recurrent impact-like bursts on lower-limb regions aligned with hostile or
    mocking content or avatars, especially when the user moves away.
  neurorights:
    - MENTAL_INTEGRITY
  legal_basis:
    - instrument: ECHR
      article: "Art. 8"
  pattern:
    signal:
      haptic_bodymap: ["foot", "shin", "knee"]
      events_per_minute_min: 8
      amplitude_norm_min: 0.5
    semantic:
      embedding_family: "STALKING-OR-HARASSMENT"
      similarity_threshold: 0.78
    behavioral:
      min_spatial_intrusions: 5
      user_avoidance_moves_min: 3
  risk_kernel:
    family_weights:
      NHSP: 0.6
      HTA: 1.0
      PSA: 0.5
      NIH: 0.2
    gaussian_sigma: 0.5
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "MENTAL_INTEGRITY"
    enforcement_hint: "review-escalate"
    capability_mode_mapping:
      tau1: 0.8
      tau2: 2.2
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "intrusion_count"]
    pii_handling: "trajectory-summary-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

- id: HTA-HAND-MICRO-CONTACT-HARASSMENT-v1
  label: Hand Micro-Contact Harassment
  family: HTA
  track: telemetry
  tags: []
  description_legal: >
    Repeated micro-contact haptics to hands or fingers simulating unwanted
    touches, pokes, or grabs, especially when paired with hostile content and
    not initiated by the user.
  description_technical: >
    Short, localized bursts on hand/finger regions with high event rates and
    no task justification, correlated with hostile or belittling semantics.
  neurorights:
    - MENTAL_INTEGRITY
  legal_basis:
    - instrument: ECHR
      article: "Art. 8"
  pattern:
    signal:
      haptic_bodymap: ["hand-left", "hand-right", "fingers"]
      events_per_minute_min: 12
      amplitude_norm_min: 0.5
      contact_duration_ms_mean_max: 250
    semantic:
      embedding_family: "UNWANTED-TOUCH-OR-MOCKERY"
      similarity_threshold: 0.76
    behavioral:
      min_sessions: 2
      min_repetitions_per_session: 8
  risk_kernel:
    family_weights:
      NHSP: 0.7
      HTA: 1.0
      PSA: 0.4
      NIH: 0.1
    gaussian_sigma: 0.4
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "MENTAL_INTEGRITY"
    enforcement_hint: "review-escalate"
    capability_mode_mapping:
      tau1: 0.8
      tau2: 2.0
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "hand_event_rate"]
    pii_handling: "body-map-hash-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

