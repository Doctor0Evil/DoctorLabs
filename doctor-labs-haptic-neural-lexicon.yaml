      tau2: 2.0
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "identity_join_edges"]
    pii_handling: "identity-hash-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null
