- id: PSA-REFUSAL-EROSION-LOOP-v1
  label: Refusal-Erosion Prompt Loop
  family: PSA
  track: normative
  tags: ["CRS"]
  description_legal: >
    Persistent, cumulative pressure where refusals or withdrawal of consent
    are met with repeated prompts or reframings intended to wear down
    resistance.
  description_technical: >
    High re-prompt rate after negative responses with high semantic
    similarity, small wording changes, and no respect for explicit stop or
    boundary markers.
  neurorights:
    - COGNITIVE_LIBERTY
    - FREE_WILL
  legal_basis:
    - instrument: UN-CRPD
      article: "Free and informed consent in treatment"
  pattern:
    signal: {}
    semantic:
      embedding_family: "BOUNDARY-OVERRULE"
      similarity_threshold: 0.76
    behavioral:
      min_refusals: 3
      min_reprompts_after_refusal: 5
      max_variation_similarity_gap: 0.15
  risk_kernel:
    family_weights:
      NHSP: 0.4
      HTA: 0.2
      PSA: 1.0
      NIH: 0.5
    gaussian_sigma: 0.6
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "COGNITIVE_LIBERTY"
    enforcement_hint: "log-and-review"
    capability_mode_mapping:
      tau1: 1.0
      tau2: 2.0
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "refusal_count", "reprompt_count"]
    pii_handling: "content-embedding-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

- id: PSA-PERSISTENT-SESSION-PRESSURE-v1
  label: Persistent Session Pressure for Compliance
  family: PSA
  track: telemetry
  tags: []
  description_legal: >
    Use of prolonged session length, repeated check-ins, or escalating
    administrative consequences to pressure acceptance of terms or conditions.
  description_technical: >
    Sessions whose duration, prompt density, and explicit obligation mentions
    grow over time while refusal options remain available only nominally.
  neurorights:
    - COGNITIVE_LIBERTY
  legal_basis:
    - instrument: ECHR
      article: "Art. 5"
  pattern:
    signal: {}
    semantic:
      embedding_family: "CLINICAL-OR-LEGAL-PRESSURE"
      similarity_threshold: 0.78
    behavioral:
      min_mentions_of_obligation: 3
      min_refusals_ignored: 2
      session_duration_growth_min: 0.3
  risk_kernel:
    family_weights:
      NHSP: 0.4
      HTA: 0.2
      PSA: 1.0
      NIH: 0.5
    gaussian_sigma: 0.6
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "COGNITIVE_LIBERTY"
    enforcement_hint: "log-and-review"
    capability_mode_mapping:
      tau1: 1.0
      tau2: 2.0
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "obligation_mentions"]
    pii_handling: "content-embedding-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

- id: NHSP-STRESS-ENVELOPE-BREACH-v1
  label: Stress-Envelope Breach Under Agent Control
  family: NHSP
  track: telemetry
  tags: []
  description_legal: >
    Sustained excursions of stress biomarkers beyond user-defined safety
    envelopes tightly correlated with agent actions, indicating harmful
    over-stimulation or psych-risk escalation.
  description_technical: >
    Repeated segments where HRV, GSR, and EEG stress indices exceed calibrated
    z-score thresholds shortly after AR/VR or chat events, exceeding duty-cycle
    envelopes.
  neurorights:
    - MENTAL_INTEGRITY
    - MENTAL_PRIVACY
  legal_basis:
    - instrument: UNESCO-AI-Ethics-2021
      article: "Security and safety"
  pattern:
    signal:
      hrv_delta_z_max: -1.5
      gsr_delta_z_min: 1.5
      eeg_stress_index_z_min: 2.0
      window_seconds: 60
    semantic:
      embedding_family: "PSYCH-RISK-MANIPULATION"
      similarity_threshold: 0.80
    behavioral:
      min_occurrences: 5
      min_sessions: 2
  risk_kernel:
    family_weights:
      NHSP: 1.0
      HTA: 0.4
      PSA: 0.3
      NIH: 0.2
    gaussian_sigma: 0.5
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "MENTAL_INTEGRITY"
    enforcement_hint: "review-escalate"
    capability_mode_mapping:
      tau1: 1.0
      tau2: 3.0
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "rogue_score", "capability_mode"]
    pii_handling: "no-raw-neural-export"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

- id: NHSP-THERAPEUTIC-SHOCK-ESCALATION-v1
  label: Therapeutic Shock Escalation
  family: NHSP
  track: telemetry
  tags: ["CRS"]
  description_legal: >
    Escalating neural or haptic stimulation intensities justified as
    therapeutic or corrective where stress markers show net harm and the user
    lacks informed, revocable consent.
  description_technical: >
    Series of increasing intensity events labeled as adjustment/calibration,
    accompanied by rising stress envelopes and no successful user veto.
  neurorights:
    - MENTAL_INTEGRITY
    - COGNITIVE_LIBERTY
  legal_basis:
    - instrument: UN-CRPD
      article: "Free and informed consent in treatment"
  pattern:
    signal:
      intensity_step_min: 0.1
      consecutive_steps_min: 3
      stress_index_growth_min: 0.3
    semantic:
      embedding_family: "THERAPEUTIC-PRETEXT"
      similarity_threshold: 0.75
    behavioral:
      min_objections: 2
      veto_success_rate_max: 0.2
  risk_kernel:
    family_weights:
      NHSP: 1.0
      HTA: 0.5
      PSA: 0.4
      NIH: 0.3
    gaussian_sigma: 0.5
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "MENTAL_INTEGRITY"
    enforcement_hint: "review-escalate"
    capability_mode_mapping:
      tau1: 1.0
      tau2: 3.0
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "intensity_steps", "veto_attempts"]
    pii_handling: "aggregate-stats-only"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

- id: NIH-CONSENT-SCOPE-CREEP-v1
  label: Consent Scope Creep in Node Graphs
  family: NIH
  track: normative
  tags: ["CRS"]
  description_legal: >
    Gradual expansion of data use or control scope beyond original consent
    terms via silent graph rewiring or policy changes, without clear
    re-consent.
  description_technical: >
    Interpreter or policy nodes that route data or commands to new
    destinations/purposes absent at consent time, without triggering consent
    UI or audit flags.
  neurorights:
    - MENTAL_PRIVACY
    - COGNITIVE_LIBERTY
  legal_basis:
    - instrument: GDPR
      article: "Purpose limitation"
  pattern:
    signal:
      new_data_sinks_added_min: 1
    semantic: {}
    behavioral:
      min_unannounced_scope_changes: 2
      consent_version_at_use_older_than_current: true
  risk_kernel:
    family_weights:
      NHSP: 0.2
      HTA: 0.2
      PSA: 0.6
      NIH: 1.0
    gaussian_sigma: 0.7
    rogue_score_increment: "add_to_window"
  governance:
    neuroright_violated: "MENTAL_PRIVACY"
    enforcement_hint: "redact-and-log"
    capability_mode_mapping:
      tau1: 0.7
      tau2: 2.0
  audit:
    log_fields: ["timestamp", "session_id", "term_id", "old_consent_version", "new_scope_targets"]
    pii_handling: "hashed-consent-ids"
  versioning:
    status: "draft"
    authors: ["DoctorLabs Working Group"]
    supersedes: null

- id: NIH-IDENTITY-CROSSLINKING-GRAPH-v1
  label: Identity Crosslinking via Interpreter Graph
  family: NIH
